<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curriculum Master - File Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4b7bec; --secondary: #a29bfe; --accent: #ffd32a;
            --success: #26de81; --bg: #f0f2f5; --text: #2d3436;
        }

        body { font-family: 'Nunito', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .toolbar { 
            position: sticky; top: 0; background: white; padding: 15px; 
            z-index: 100; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px;
            border: 2px solid var(--primary);
        }

        .curriculum-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 25px; max-width: 1500px; margin: 0 auto;
        }

        .semester-card {
            background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #dcdde1; overflow: hidden; display: flex; flex-direction: column;
        }

        .semester-header {
            background: var(--primary); color: white; padding: 12px 15px;
            font-family: 'Fredoka One', cursive; display: flex; justify-content: space-between;
        }

        .semester-card:nth-child(even) .semester-header { background: var(--secondary); }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 600px; }
        th { background: #f8f9fa; padding: 10px 5px; border-bottom: 2px solid #eee; font-size: 0.6rem; text-transform: uppercase; }
        td { padding: 5px; border-bottom: 1px solid #f1f2f6; }

        .editable { outline: none; padding: 3px; border-radius: 3px; transition: 0.2s; }
        .editable:focus { background: #fff9db; box-shadow: 0 0 0 2px var(--accent); }

        .btn { padding: 10px 20px; border-radius: 50px; border: none; font-family: 'Fredoka One', cursive; cursor: pointer; transition: 0.2s; }
        .btn-open { background: var(--accent); color: #333; }
        .btn-save { background: var(--success); color: white; }
        
        .btn-sm { border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 4px; padding: 2px 4px; font-size: 0.7rem; }
        
        .sem-footer { padding: 10px; background: #f8f9fa; text-align: right; font-weight: 800; }

        @media (max-width: 1100px) { .curriculum-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn btn-open" onclick="linkFile()">📂 1. Link data.json File</button>
        <button class="btn btn-save" onclick="saveToFile()">💾 2. Save Changes to File</button>
        <div id="fileStatus" style="align-self: center; font-size: 0.8rem; font-weight: bold;">Status: No file linked</div>
    </div>

    <div class="curriculum-grid" id="grid"></div>

    <script>
        let data = [];
        let fileHandle = null;

        // Create default structure if file is empty
        function createDefaults() {
            let temp = [];
            for (let s = 1; s <= 8; s++) {
                let sem = { id: s, courses: [] };
                for (let c = 1; c <= 10; c++) {
                    sem.courses.push({ cat: 'PC', code: 'CS'+s+'0'+c, name: 'Course '+c, l:'3', t:'0', p:'0', cr:'3' });
                }
                temp.push(sem);
            }
            return temp;
        }

        async function linkFile() {
            try {
                [fileHandle] = await window.showOpenFilePicker({
                    types: [{ description: 'JSON File', accept: {'application/json': ['.json']} }]
                });
                
                const file = await fileHandle.getFile();
                const content = await file.text();
                
                data = content ? JSON.parse(content) : createDefaults();
                document.getElementById('fileStatus').innerText = "✅ Linked: " + file.name;
                render();
            } catch (err) {
                console.error(err);
                alert("File access denied or cancelled.");
            }
        }

        async function saveToFile() {
            if (!fileHandle) return alert("Please link the data.json file first!");
            
            try {
                const writable = await fileHandle.createWritable();
                await writable.write(JSON.stringify(data, null, 2));
                await writable.close();
                alert("File successfully updated in your directory!");
            } catch (err) {
                alert("Error saving: " + err.message);
            }
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            data.forEach((sem, sIdx) => {
                const card = document.createElement('div');
                card.className = 'semester-card';

                let rows = sem.courses.map((c, cIdx) => `
                    <tr>
                        <td>
                            <button class="btn-sm" onclick="reorder(${sIdx}, ${cIdx}, -1)">↑</button>
                            <button class="btn-sm" onclick="reorder(${sIdx}, ${cIdx}, 1)">↓</button>
                        </td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'cat',this.innerText)">${c.cat}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'code',this.innerText)">${c.code}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'name',this.innerText)">${c.name}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'l',this.innerText)">${c.l}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'t',this.innerText)">${c.t}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'p',this.innerText)">${c.p}</div></td>
                        <td><div class="editable" contenteditable="true" onblur="update(${sIdx},${cIdx},'cr',this.innerText)">${c.cr}</div></td>
                        <td>
                            <select onchange="transfer(${sIdx}, ${cIdx}, this.value)" style="font-size: 0.6rem">
                                <option disabled selected>Move...</option>
                                ${data.map(t => `<option value="${t.id-1}">Sem ${t.id}</option>`).join('')}
                            </select>
                        </td>
                    </tr>
                `).join('');

                card.innerHTML = `
                    <div class="semester-header">Semester ${sem.id}</div>
                    <table>
                        <thead><tr><th>Pos</th><th>Cat</th><th>Code</th><th>Name</th><th>L</th><th>T</th><th>P</th><th>Cr</th><th>Move</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                    <div class="sem-footer">Credits: ${sem.courses.reduce((sum, c) => sum + (parseFloat(c.cr) || 0), 0)}</div>
                `;
                grid.appendChild(card);
            });
        }

        function update(sIdx, cIdx, field, val) { 
            data[sIdx].courses[cIdx][field] = val; 
            if(field === 'cr') render(); 
        }

        function reorder(sIdx, cIdx, dir) {
            const list = data[sIdx].courses;
            const target = cIdx + dir;
            if (target >= 0 && target < list.length) {
                [list[cIdx], list[target]] = [list[target], list[cIdx]];
                render();
            }
        }

        function transfer(sIdx, cIdx, targetSIdx) {
            const item = data[sIdx].courses.splice(cIdx, 1)[0];
            data[targetSIdx].courses.push(item);
            render();
        }

        // Initialize with default view
        data = createDefaults();
        render();
    </script>
</body>
</html>
